
networks:
  timesheet-network:
    driver: bridge

services:

  # ─── MySQL Databases ───────────────────────────────────────────

  mysql-auth:
    image: mysql:8.0
    container_name: mysql-auth
    environment:
      MYSQL_ROOT_PASSWORD: kilysm
      MYSQL_DATABASE: authdb
    ports:
      - "3307:3306"       # host:container (3307 to avoid conflict with local MySQL)
    networks:
      - timesheet-network
    volumes:
    - mysql-auth-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pkilysm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  mysql-timesheet:
    image: mysql:8.0
    container_name: mysql-timesheet
    environment:
      MYSQL_ROOT_PASSWORD: kilysm
      MYSQL_DATABASE: timesheet_db
    ports:
      - "3308:3306"
    networks:
      - timesheet-network
    volumes:
    - mysql-timesheet-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pkilysm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  mysql-leave:
    image: mysql:8.0
    container_name: mysql-leave
    environment:
      MYSQL_ROOT_PASSWORD: kilysm
      MYSQL_DATABASE: leave_db
    ports:
      - "3309:3306"
    networks:
      - timesheet-network
    volumes:
    - mysql-leave-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pkilysm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  mysql-admin:
    image: mysql:8.0
    container_name: mysql-admin
    environment:
      MYSQL_ROOT_PASSWORD: kilysm
      MYSQL_DATABASE: admin_db
    ports:
      - "3310:3306"
    networks:
      - timesheet-network
    volumes:
    - mysql-admin-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pkilysm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  # ─── Eureka Server ─────────────────────────────────────────────

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - timesheet-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Auth Service ──────────────────────────────────────────────

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    networks:
      - timesheet-network
    depends_on:
      mysql-auth:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-auth:3306/authdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: kilysm
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

  # ─── API Gateway ───────────────────────────────────────────────

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    networks:
      - timesheet-network
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

  # ─── Timesheet Service ─────────────────────────────────────────

  timesheet-service:
    build:
      context: ./timesheet-service
      dockerfile: Dockerfile
    container_name: timesheet-service
    ports:
      - "8082:8082"
    networks:
      - timesheet-network
    depends_on:
      mysql-timesheet:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-timesheet:3306/timesheet_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: kilysm
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

  # ─── Leave Service ─────────────────────────────────────────────

  leave-service:
    build:
      context: ./leave-service
      dockerfile: Dockerfile
    container_name: leave-service
    ports:
      - "8083:8083"
    networks:
      - timesheet-network
    depends_on:
      mysql-leave:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-leave:3306/leave_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: kilysm
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

  # ─── Admin Service ─────────────────────────────────────────────

  admin-service:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
    container_name: admin-service
    ports:
      - "8084:8084"
    networks:
      - timesheet-network
    depends_on:
      mysql-admin:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-admin:3306/admin_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: kilysm
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

      # Add this at the very bottom of docker-compose.yml
volumes:
  mysql-auth-data:
  mysql-timesheet-data:
  mysql-leave-data:
  mysql-admin-data: