server:
  port: 8083

spring:
  application:
    name: leave-service

  datasource:
    url: jdbc:mysql://localhost:3306/leave_db?createDatabaseIfNotExist=true
    username: root
    password: kilysm
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    lease-renewal-interval-in-seconds: 10
# ✅ Feign configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
  circuitbreaker:
    enabled: true


springdoc:
  api-docs:
    path: /leave/v3/api-docs        # JSON docs endpoint
  swagger-ui:
    path: /swagger-ui.html   # UI endpoint
    operationsSorter: method
    tagsSorter: alph

management:
  endpoints:
    web:
      exposure:
        include: health,info