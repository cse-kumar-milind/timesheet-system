server:
  port: 8082

spring:
  application:
    name: timesheet-service

  datasource:
    url: jdbc:mysql://localhost:3306/timesheet_db?createDatabaseIfNotExist=true
    username: root
    password: kilysm
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    lease-renewal-interval-in-seconds: 10

springdoc:
  api-docs:
    path: /v3/api-docs        # JSON docs endpoint
  swagger-ui:
    path: /swagger-ui.html   # UI endpoint
    operationsSorter: method
    tagsSorter: alph

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
  circuitbreaker:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info